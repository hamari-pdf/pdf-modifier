<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@hamari_pdf Tool Final</title>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; text-align: center; padding: 40px 20px; }
        .card { background: #161b22; border: 1px solid #30363d; padding: 30px; border-radius: 12px; max-width: 500px; margin: auto; }
        button { background: #238636; color: white; padding: 15px 30px; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; margin-top: 15px; }
        button:hover { background: #2ea043; }
        #status { margin-top: 20px; font-weight: bold; font-size: 15px; }
        input[type="file"] { margin: 15px 0; padding: 10px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: white; width: 100%; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color:#58a6ff;">🚀 @hamari_pdf — Link Injector Tool</h2>
        <p style="color:#8b949e; font-size:13px;">
            Har page pe sirf <b>@hamari_pdf</b> naam aur poora page clickable link hoga.<br>
            Purani saari links remove ho jayengi.
        </p>

        <input type="file" id="pdfInput" accept="application/pdf">
        <button id="btn" onclick="processPDF()">🔗 INJECT LINK & DOWNLOAD ✅</button>

        <div id="status">Waiting for file...</div>
    </div>

    <script>
        async function processPDF() {
            const input = document.getElementById('pdfInput');
            const status = document.getElementById('status');
            const btn = document.getElementById('btn');

            if (!input.files[0]) return alert("Pehle file chuno!");

            const originalName = input.files[0].name;
            const targetLink = 'https://t.me/hamari_pdf';

            btn.disabled = true;
            status.innerText = "Processing... Purani links remove ho rahi hain ⏳";
            status.style.color = "#e3b341";

            try {
                const arrayBuffer = await input.files[0].arrayBuffer();
                const { PDFDocument, rgb, PDFString, PDFName } = PDFLib;

                const pdfDoc = await PDFDocument.load(arrayBuffer, { ignoreEncryption: true });
                const pages = pdfDoc.getPages();

                for (const page of pages) {
                    const { width, height } = page.getSize();

                    // ── STEP 1: Purani SAARI annotations/links delete karo ──
                    page.node.delete(PDFName.of('Annots'));

                    // ── STEP 2: Top par sirf "@hamari_pdf" text likho ──
                    // Pehle ek choti white background strip
                    page.drawRectangle({
                        x: 0,
                        y: height - 22,
                        width: width,
                        height: 22,
                        color: rgb(1, 1, 1),
                        opacity: 1,
                    });

                    // Sirf @hamari_pdf naam
                    page.drawText('@hamari_pdf', {
                        x: 10,
                        y: height - 15,
                        size: 10,
                        color: rgb(0, 0.35, 0.75),
                    });

                    // ── STEP 3: POORA PAGE clickable link banana ──
                    const fullPageLink = pdfDoc.context.obj({
                        Type: 'Annot',
                        Subtype: 'Link',
                        // Rect = [x1, y1, x2, y2] — poora page cover karo
                        Rect: [0, 0, width, height],
                        Border: [0, 0, 0],   // koi border nahi dikhega
                        A: {
                            Type: 'Action',
                            S: 'URI',
                            URI: PDFString.of(targetLink),
                        },
                    });

                    const annotRef = pdfDoc.context.register(fullPageLink);
                    page.node.set(PDFName.of('Annots'), pdfDoc.context.obj([annotRef]));
                }

                // ── STEP 4: Save & Download with SAME original name ──
                const pdfBytes = await pdfDoc.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);

                const a = document.createElement('a');
                a.href = url;
                a.download = originalName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                status.innerText = "✅ Done! PDF download ho gayi — naam same rakha gaya.";
                status.style.color = "#3fb950";

            } catch (err) {
                console.error(err);
                status.innerText = "❌ Error: " + err.message;
                status.style.color = "#f85149";
            }

            btn.disabled = false;
        }
    </script>
</body>
</html>
