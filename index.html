<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@hamari_pdf Pro Tool</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Arial', sans-serif; text-align: center; padding-top: 50px; }
        .card { background: #1a1a1a; padding: 30px; border-radius: 15px; display: inline-block; border: 1px solid #0088cc; box-shadow: 0 0 20px rgba(0,136,204,0.3); }
        h2 { color: #0088cc; margin-bottom: 5px; }
        input { margin: 20px 0; display: block; width: 100%; }
        button { background: #0088cc; color: white; padding: 15px 30px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; }
        button:hover { background: #006699; }
        #status { margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🚀 @hamari_pdf Editor</h2>
        <p style="font-size: 12px; color: #888;">Full Page Clickable Link & Original Name</p>
        
        <input type="file" id="pdfInput" accept="application/pdf">
        <button id="mainBtn" onclick="processPDF()">Generate & Download ⚡</button>
        
        <div id="status">Ready</div>
    </div>

    <script>
        async function processPDF() {
            const input = document.getElementById('pdfInput');
            const status = document.getElementById('status');
            const btn = document.getElementById('mainBtn');

            if (!input.files[0]) return alert("Pehle file select karein!");

            const originalName = input.files[0].name; // Name save kiya
            btn.disabled = true;
            status.innerText = "Processing... Please wait ⏳";
            status.style.color = "#0088cc";

            try {
                const arrayBuffer = await input.files[0].arrayBuffer();
                const { PDFDocument, rgb, PDFString, PDFName } = PDFLib;

                const pdfDoc = await PDFDocument.load(arrayBuffer, { ignoreEncryption: true });
                const pages = pdfDoc.getPages();
                
                // AAPKA SAHI LINK
                const targetLink = 'https://t.me/hamari_pdf';

                for (const page of pages) {
                    const { width, height } = page.getSize();

                    // 1. Purana Header Hide Karne ke liye White Strip
                    page.drawRectangle({
                        x: 0, y: height - 35,
                        width: width, height: 35,
                        color: rgb(1, 1, 1)
                    });

                    // 2. Naya Branding @hamari_pdf
                    page.drawText('🚀 Join: @hamari_pdf', {
                        x: 20, y: height - 23,
                        size: 13, color: rgb(0, 0.4, 0.8)
                    });

                    // 3. FULL PAGE CLICKABLE LINK (Har page par)
                    const linkAnnot = pdfDoc.context.obj({
                        Type: 'Annot',
                        Subtype: 'Link',
                        Rect: [0, 0, width, height],
                        Border: [0, 0, 0],
                        A: {
                            Type: 'Action',
                            S: 'URI',
                            URI: PDFString.of(targetLink)
                        }
                    });

                    const linkRef = pdfDoc.context.register(linkAnnot);
                    let annots = page.node.get(PDFName.of('Annots')) || pdfDoc.context.obj([]);
                    if (!page.node.has(PDFName.of('Annots'))) {
                        page.node.set(PDFName.of('Annots'), annots);
                    }
                    annots.push(linkRef);
                }

                const pdfBytes = await pdfDoc.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                
                // DOWNLOAD WITH ORIGINAL NAME
                const a = document.createElement('a');
                a.href = url;
                a.download = originalName; 
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

                status.innerText = "Success! Done ✅";
                status.style.color = "#4ade80";
            } catch (err) {
                console.error(err);
                status.innerText = "Error! File check karein.";
                status.style.color = "#ff4444";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
