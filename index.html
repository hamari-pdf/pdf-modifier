<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@hamari_pdf Tool Final</title>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; text-align: center; padding: 40px 20px; }
        .card { background: #161b22; border: 1px solid #30363d; padding: 30px; border-radius: 12px; max-width: 500px; margin: auto; }
        button { background: #238636; color: white; padding: 15px 30px; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; margin-top: 15px; width: 100%; }
        button:disabled { background: #444; cursor: not-allowed; }
        #status { margin-top: 20px; font-weight: bold; font-size: 15px; min-height: 24px; }
        input[type="file"] { margin: 15px 0; padding: 10px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: white; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color:#58a6ff;">🚀 @hamari_pdf — Link Injector</h2>
        <p style="color:#8b949e; font-size:13px;">
            Har page pe <b>@hamari_pdf</b> naam + poora page clickable.<br>
            Purani links remove. PDF naam same.
        </p>
        <input type="file" id="pdfInput" accept="application/pdf">
        <button id="btn" onclick="processPDF()">🔗 INJECT & DOWNLOAD ✅</button>
        <div id="status">File chuno...</div>
    </div>

<script>
async function processPDF() {
    const input  = document.getElementById('pdfInput');
    const status = document.getElementById('status');
    const btn    = document.getElementById('btn');

    if (!input.files[0]) return alert("Pehle PDF file chuno!");

    const originalName = input.files[0].name;
    const targetLink   = 'https://t.me/hamari_pdf';

    btn.disabled       = true;
    status.innerText   = "⏳ Processing...";
    status.style.color = "#e3b341";

    try {
        const arrayBuffer = await input.files[0].arrayBuffer();
        const { PDFDocument, rgb, PDFString, PDFName, PDFArray, PDFDict, PDFRef } = PDFLib;

        const pdfDoc = await PDFDocument.load(arrayBuffer, { ignoreEncryption: true });
        const pages  = pdfDoc.getPages();

        for (const page of pages) {
            const { width, height } = page.getSize();

            // ── 1. Purani saari annotations remove ──
            page.node.delete(PDFName.of('Annots'));

            // ── 2. Top strip white background ──
            page.drawRectangle({
                x: 0,
                y: height - 22,
                width: width,
                height: 22,
                color: rgb(1, 1, 1),
            });

            // ── 3. Sirf @hamari_pdf text ──
            page.drawText('@hamari_pdf', {
                x: 10,
                y: height - 15,
                size: 10,
                color: rgb(0.04, 0.39, 0.8),
            });

            // ── 4. FULL PAGE clickable annotation (correct method) ──
            // URI Action dictionary
            const uriAction = pdfDoc.context.obj({
                Type: 'Action',
                S:    'URI',
                URI:  PDFString.of(targetLink),
            });

            // Link annotation — Rect covers ENTIRE page [x1, y1, x2, y2]
            const linkAnnot = pdfDoc.context.obj({
                Type:    'Annot',
                Subtype: 'Link',
                Rect:    pdfDoc.context.obj([0, 0, width, height]),
                F:       4,               // Print flag
                Border:  pdfDoc.context.obj([0, 0, 0]),
                BS: pdfDoc.context.obj({ W: 0 }),   // Border style width 0
                H:       'N',             // No highlight on click
                A:       uriAction,
            });

            const annotRef = pdfDoc.context.register(linkAnnot);

            // Annots array set karo
            page.node.set(
                PDFName.of('Annots'),
                pdfDoc.context.obj([annotRef])
            );
        }

        // ── 5. Save & Download — same naam ──
        const pdfBytes = await pdfDoc.save();
        const blob     = new Blob([pdfBytes], { type: 'application/pdf' });
        const url      = URL.createObjectURL(blob);

        const a = document.createElement('a');
        a.href     = url;
        a.download = originalName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        status.innerText   = "✅ Done! PDF download ho gayi!";
        status.style.color = "#3fb950";

    } catch (err) {
        console.error(err);
        status.innerText   = "❌ Error: " + err.message;
        status.style.color = "#f85149";
    }

    btn.disabled = false;
}
</script>
</body>
</html>
