<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@hamari_pdf Tool Pro</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        body { text-align: center; font-family: sans-serif; background: #0f172a; color: white; padding: 30px; }
        .box { background: #1e293b; padding: 30px; border-radius: 15px; border: 1px solid #334155; display: inline-block; max-width: 90%; }
        h2 { color: #38bdf8; }
        input { margin: 20px 0; width: 100%; }
        button { background: #38bdf8; color: #0f172a; padding: 15px 30px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; }
        #status { margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="box">
        <h2>🔥 @hamari_pdf Magic</h2>
        <p>Watermark + Full Page Clickable Link</p>
        
        <input type="file" id="pdfInput" accept="application/pdf">
        <button id="mainBtn" onclick="processPDF()">Start Processing ⚡</button>
        
        <div id="status">Ready...</div>
    </div>

    <script>
        async function processPDF() {
            const input = document.getElementById('pdfInput');
            const status = document.getElementById('status');
            const btn = document.getElementById('mainBtn');

            if (!input.files[0]) return alert("Pehle file select karo!");

            status.innerText = "Processing... Mobile par thoda wait karein ⏳";
            status.style.color = "#fbbf24";
            btn.disabled = true;

            try {
                const arrayBuffer = await input.files[0].arrayBuffer();
                const { PDFDocument, rgb, PDFString } = PDFLib;

                // Fast Load
                const pdfDoc = await PDFDocument.load(arrayBuffer, { ignoreEncryption: true });
                const pages = pdfDoc.getPages();

                for (const page of pages) {
                    const { width, height } = page.getSize();

                    // 1. Top White Cover (Purana hatane ke liye)
                    page.drawRectangle({
                        x: 0, y: height - 35,
                        width: width, height: 35,
                        color: rgb(1, 1, 1)
                    });

                    // 2. Branding Text
                    page.drawText('@hamari_pdf | Click here to Join', {
                        x: 20, y: height - 22,
                        size: 12, color: rgb(0, 0.4, 0.8)
                    });

                    // 3. Invisible Link (Full Page)
                    const link = pdfDoc.context.obj({
                        Type: 'Annot', Subtype: 'Link',
                        Rect: [0, 0, width, height],
                        Border: [0, 0, 0],
                        A: { Type: 'Action', S: 'URI', URI: PDFString.of('https://t.me/hamari_pdf') }
                    });
                    
                    const linkRef = pdfDoc.context.register(link);
                    const annots = page.node.get(PDFLib.PDFName.of('Annots')) || pdfDoc.context.obj([]);
                    if (!page.node.has(PDFLib.PDFName.of('Annots'))) page.node.set(PDFLib.PDFName.of('Annots'), annots);
                    annots.push(linkRef);
                }

                // Save and Download
                const pdfBytes = await pdfDoc.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "Hamari_PDF_" + Date.now() + ".pdf";
                a.click();

                status.innerText = "Success! ✅ Downloaded";
                status.style.color = "#4ade80";
            } catch (e) {
                console.error(e);
                status.innerText = "Error: File size zyada hai ya browser weak hai.";
                status.style.color = "#f87171";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
