<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@hamari_pdf Final Tool</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 40px; }
        .box { background: #1e293b; padding: 30px; border-radius: 15px; border: 2px solid #38bdf8; display: inline-block; width: 100%; max-width: 400px; }
        input { margin: 20px 0; width: 100%; color: white; }
        button { background: #38bdf8; color: #0f172a; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; }
        #status { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="box">
        <h2 style="color:#38bdf8; margin:0;">🔥 @hamari_pdf Fix</h2>
        <p style="font-size:12px; color:#94a3b8;">Full Clickable + Original Name</p>
        
        <input type="file" id="pdfInput" accept="application/pdf">
        <button id="btn" onclick="processPDF()">START PROCESSING ⚡</button>
        
        <div id="status">Waiting for file...</div>
    </div>

    <script>
        async function processPDF() {
            const input = document.getElementById('pdfInput');
            const status = document.getElementById('status');
            const btn = document.getElementById('btn');

            if (!input.files[0]) return alert("File select karo bhai!");

            const originalName = input.files[0].name;
            btn.disabled = true;
            status.innerText = "Deep Injecting Link... ⏳";
            status.style.color = "#fbbf24";

            try {
                const arrayBuffer = await input.files[0].arrayBuffer();
                const { PDFDocument, rgb, PDFString, PDFName, PDFArray } = PDFLib;

                const pdfDoc = await PDFDocument.load(arrayBuffer, { ignoreEncryption: true });
                const pages = pdfDoc.getPages();
                const myLink = 'https://t.me/hamari_pdf';

                for (const page of pages) {
                    const { width, height } = page.getSize();

                    // 1. Top Strip (Masking)
                    page.drawRectangle({
                        x: 0, y: height - 35,
                        width: width, height: 35,
                        color: rgb(1, 1, 1)
                    });

                    // 2. Branding
                    page.drawText('🚀 Join: @hamari_pdf', {
                        x: 20, y: height - 23,
                        size: 13, color: rgb(0, 0.4, 0.8)
                    });

                    // 3. FORCE LINK INJECTION (Sabse Solid Tarika)
                    const linkAnnot = pdfDoc.context.obj({
                        Type: 'Annot',
                        Subtype: 'Link',
                        Rect: [0, 0, width, height],
                        Border: [0, 0, 0],
                        A: { Type: 'Action', S: 'URI', URI: PDFString.of(myLink) }
                    });

                    const linkRef = pdfDoc.context.register(linkAnnot);

                    // Safely find or create Annots array
                    let annots = page.node.get(PDFName.of('Annots'));
                    
                    if (!annots) {
                        // Agar Annots folder nahi hai toh naya banao
                        page.node.set(PDFName.of('Annots'), pdfDoc.context.obj([linkRef]));
                    } else if (annots instanceof PDFArray) {
                        // Agar array hai toh usme add karo
                        annots.push(linkRef);
                    } else {
                        // Agar folder reference hai toh use resolve karke add karo
                        try {
                            const resolvedAnnots = pdfDoc.context.lookup(annots);
                            if (resolvedAnnots instanceof PDFArray) {
                                resolvedAnnots.push(linkRef);
                            }
                        } catch (e) {
                            console.log("Fallback for specific PDF structure");
                        }
                    }
                }

                const pdfBytes = await pdfDoc.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = originalName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

                status.innerText = "100% DONE ✅";
                status.style.color = "#4ade80";
            } catch (err) {
                console.error(err);
                status.innerText = "Error: Ye PDF protected hai.";
                status.style.color = "#f87171";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
