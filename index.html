<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@hamari_pdf Tool Pro</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 40px; }
        .box { background: #1e293b; padding: 30px; border-radius: 15px; border: 1px solid #38bdf8; display: inline-block; width: 100%; max-width: 400px; }
        h2 { color: #38bdf8; margin-top: 0; }
        input { margin: 20px 0; width: 100%; }
        button { background: #38bdf8; color: #0f172a; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; }
        #status { margin-top: 20px; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="box">
        <h2>🚀 @hamari_pdf Tool</h2>
        <p style="font-size: 12px; color: #94a3b8;">Original Name + Full Page Click Link</p>
        
        <input type="file" id="pdfInput" accept="application/pdf">
        <button id="btn" onclick="processPDF()">Generate PDF Now ⚡</button>
        
        <div id="status">Taiyar...</div>
    </div>

    <script>
        async function processPDF() {
            const input = document.getElementById('pdfInput');
            const status = document.getElementById('status');
            const btn = document.getElementById('btn');

            if (!input.files[0]) return alert("File chuno bhai!");

            const originalFileName = input.files[0].name; // Original naam save kiya
            status.innerText = "Processing... Thoda wait karo ⏳";
            status.style.color = "yellow";
            btn.disabled = true;

            try {
                const arrayBuffer = await input.files[0].arrayBuffer();
                const { PDFDocument, rgb, PDFString, PDFName } = PDFLib;

                const pdfDoc = await PDFDocument.load(arrayBuffer, { ignoreEncryption: true });
                const pages = pdfDoc.getPages();
                const myLink = 'https://t.me/hamari_pdf'; // Sahi Link

                for (const page of pages) {
                    const { width, height } = page.getSize();

                    // 1. Top Strip (Purana name chupane ke liye)
                    page.drawRectangle({
                        x: 0, y: height - 35,
                        width: width, height: 35,
                        color: rgb(1, 1, 1)
                    });

                    // 2. Naya Branding
                    page.drawText('Join: @hamari_pdf', {
                        x: 20, y: height - 22,
                        size: 13, color: rgb(0, 0.4, 0.8)
                    });

                    // 3. Invisible Link (Full Page Clickable)
                    const link = pdfDoc.context.obj({
                        Type: 'Annot', Subtype: 'Link',
                        Rect: [0, 0, width, height],
                        Border: [0, 0, 0],
                        A: { Type: 'Action', S: 'URI', URI: PDFString.of(myLink) }
                    });
                    
                    const linkRef = pdfDoc.context.register(link);
                    let annots = page.node.get(PDFName.of('Annots')) || pdfDoc.context.obj([]);
                    if (!page.node.has(PDFName.of('Annots'))) page.node.set(PDFName.of('Annots'), annots);
                    annots.push(linkRef);
                }

                const pdfBytes = await pdfDoc.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = originalFileName; // Same Name use hoga
                a.click();

                status.innerText = "Success! Done ✅";
                status.style.color = "#4ade80";
            } catch (e) {
                console.error(e);
                status.innerText = "Error: Badi file hai ya lock hai.";
                status.style.color = "#f87171";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
